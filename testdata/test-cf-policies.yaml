AWSTemplateFormatVersion: 2010-09-09
Description: Template with standalone IAM policies

Resources:
  MyManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:ListBucket
            Resource: "*"
          - Effect: Deny
            Action:
              - s3:DeleteBucket
            Resource: "*"

  MyInlinePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: MyInlinePolicy
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:DescribeSecurityGroups
              - logs:CreateLogGroup
            Resource: "*"
      Roles:
        - !Ref SomeRole

  NotAPolicy:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: my-bucket
