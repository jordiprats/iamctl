name: Test Policy Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-policy-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Build the tool
        run: go build -o iam-pb-check main.go

      - name: Run tests
        run: bash test.sh
        run: echo "All iam-pb-check tests complete."